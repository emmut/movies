name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest
    # Env validation is skipped; secrets are not needed for lint/typecheck/tests.
    env:
      SKIP_ENV_VALIDATION: 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Reads engines.node / volta from package.json.
          node-version-file: package.json
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Test
        run: pnpm test

  fallow:
    name: Fallow audit
    runs-on: ubuntu-latest
    # Needed to upload SARIF results to GitHub code scanning.
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so audit can resolve the merge-base for changed files.
          fetch-depth: 0

      - name: Run Fallow
        uses: fallow-rs/fallow@v2
        with:
          format: sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: fallow.sarif
