name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest
    # Env validation is skipped; secrets are not needed for lint/typecheck/tests.
    env:
      SKIP_ENV_VALIDATION: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Reads engines.node / volta from package.json.
          node-version-file: package.json
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Test
        run: pnpm test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: movies
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      imgproxy:
        image: darthsim/imgproxy:v4
        env:
          # Must match IMGPROXY_KEY/SALT below — the app signs URLs with those
          # and imgproxy verifies the signature with these.
          IMGPROXY_KEY: deadbeef
          IMGPROXY_SALT: cafe
          IMGPROXY_ALLOWED_SOURCES: https://image.tmdb.org/
        ports:
          - 8080:8080
        options: >-
          --health-cmd "imgproxy health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/movies
      BETTER_AUTH_SECRET: test-secret-test-secret-test-secret-0001
      MOVIE_DB_ACCESS_TOKEN: ${{ secrets.MOVIE_DB_ACCESS_TOKEN }}
      DISCORD_CLIENT_ID: test
      DISCORD_CLIENT_SECRET: test
      GITHUB_CLIENT_ID: test
      GITHUB_CLIENT_SECRET: test
      # Valid hex; imgproxy URL signing decodes these.
      IMGPROXY_KEY: deadbeef
      IMGPROXY_SALT: cafe
      NEXT_PUBLIC_IMGPROXY_ENDPOINT: http://localhost:8080
      NEXT_PUBLIC_IMGPROXY_BASE_URL: https://image.tmdb.org/t/p/original
      NEXT_PUBLIC_POSTHOG_KEY: test
      NEXT_PUBLIC_POSTHOG_HOST: https://us.i.posthog.com
      NEXT_PUBLIC_BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync database schema
        run: pnpm db:push --force

      - name: Install Playwright browser
        run: pnpm e2e:install

      - name: Run e2e tests
        run: pnpm e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  fallow:
    name: Fallow audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so audit can resolve the merge-base for changed files.
          fetch-depth: 0

      - name: Run Fallow
        uses: fallow-rs/fallow@v2
        with:
          command: audit
          gate: new-only
